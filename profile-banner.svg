<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <!-- Style block for custom fonts and transitions -->
  <style>
    .title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-weight: 800;
      font-size: 36px;
      fill: #ffffff;
      letter-spacing: 1px;
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-weight: 600;
      font-size: 18px;
      fill: #818cf8; /* Indigo accent */
      letter-spacing: 0.5px;
    }
    .desc {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-weight: 400;
      font-size: 14px;
      fill: #94a3b8;
    }
    .tag {
      font-family: monospace;
      font-weight: bold;
      font-size: 13px;
      fill: #38bdf8; /* Sky blue accent */
    }
    .node {
      fill: #090d16;
      stroke: #38bdf8;
      stroke-width: 2;
    }
    .node-center {
      fill: #818cf8;
    }
    .link {
      stroke: #1e293b;
      stroke-width: 1.5;
      stroke-dasharray: 4 2;
    }
  </style>

  <!-- Background Gradients -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070f" />
      <stop offset="100%" stop-color="#0c1020" />
    </linearGradient>
    <radialGradient id="glow-indigo" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-sky" cx="20%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1e293b" opacity="0.6" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <rect width="100%" height="100%" fill="url(#glow-indigo)" />
  <rect width="100%" height="100%" fill="url(#glow-sky)" />
  <rect width="100%" height="100%" fill="url(#dots)" />

  <!-- Bento Grid Decorative lines (Minimalist outline) -->
  <path d="M 0,239 L 800,239" stroke="#1e293b" stroke-width="1" />
  <path d="M 520,0 L 520,240" stroke="#1e293b" stroke-width="1" opacity="0.4" />
  <path d="M 0,1 L 800,1" stroke="#1e293b" stroke-width="1" />

  <!-- Left Side: Typography -->
  <!-- Welcome Tag -->
  <text x="50" y="65" class="tag">&lt;hello_world&gt;</text>
  
  <!-- Title -->
  <text x="50" y="110" class="title">JOHN MARK CAYABYAB</text>
  
  <!-- Subtitle -->
  <text x="50" y="146" class="subtitle">Full-Stack Developer &amp; CS Graduate</text>
  
  <!-- Short Desc -->
  <text x="50" y="182" class="desc">Building clean software, optimizing data systems, and automating</text>
  <text x="50" y="202" class="desc">workflows with robust, modern architectures.</text>

  <!-- Right Side: Bento / Network visual -->
  <g transform="translate(30, 0)">
    <!-- Connections -->
    <line x1="580" y1="80" x2="660" y2="60" class="link" />
    <line x1="660" y1="60" x2="700" y2="130" class="link" />
    <line x1="700" y1="130" x2="610" y2="160" class="link" />
    <line x1="610" y1="160" x2="580" y2="80" class="link" />
    <line x1="580" y1="80" x2="630" y2="110" class="link" />
    <line x1="660" y1="60" x2="630" y2="110" class="link" />
    <line x1="700" y1="130" x2="630" y2="110" class="link" />
    <line x1="610" y1="160" x2="630" y2="110" class="link" />
    
    <!-- Nodes -->
    <circle cx="580" cy="80" r="6" class="node" />
    <circle cx="660" cy="60" r="7" class="node" />
    <circle cx="700" cy="130" r="8" class="node" />
    <circle cx="610" cy="160" r="6" class="node" />
    <circle cx="630" cy="110" r="9" class="node" />
    <circle cx="630" cy="110" r="4" class="node-center" />
    
    <!-- Little Bento outline on the side -->
    <rect x="520" y="30" width="220" height="180" rx="8" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.3" />
  </g>
</svg>
