<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <!-- Style block for custom fonts and transitions -->
  <style>
    @keyframes flow {
      to {
        stroke-dashoffset: -20;
      }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .font-sans {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    .font-mono {
      font-family: SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .title {
      font-weight: 800;
      font-size: 34px;
      fill: #ffffff;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-weight: 600;
      font-size: 16px;
      fill: #facc15;
      letter-spacing: 0.5px;
    }
    .desc {
      font-weight: 400;
      font-size: 13.5px;
      fill: #94a3b8; /* Slate 400 */
    }
    .tag {
      font-weight: bold;
      font-size: 10px;
      fill: #06b6d4;
    }
    .tag-border {
      fill: #1e1b4b;
      stroke: #06b6d4;
      stroke-width: 1.2;
    }
    .panel-bg {
      fill: #130f26;
      fill-opacity: 0.8;
      stroke: #2e2252;
      stroke-width: 1.5;
    }
    .node {
      fill: #1a153b;
      stroke: #2e2252;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .node-active-cyan {
      stroke: #06b6d4;
    }
    .node-active-gold {
      stroke: #facc15;
    }
    .node-active-purple {
      stroke: #a78bfa;
    }
    .link-flow {
      stroke-width: 1.5;
      stroke-dasharray: 6 4;
      animation: flow 1.5s linear infinite;
    }
    .link-flow-cyan {
      stroke: #06b6d4;
    }
    .link-flow-gold {
      stroke: #facc15;
    }
    .link-flow-purple {
      stroke: #a78bfa;
    }
    .pulse-dot {
      animation: pulse 2s infinite ease-in-out;
    }
    .coordinate-tick {
      stroke: #2e2252;
      stroke-width: 1;
      opacity: 0.6;
    }
    .coordinate-text {
      font-size: 9px;
      fill: #475569;
    }
  </style>

  <!-- Background Gradients -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090518" />
      <stop offset="60%" stop-color="#0f0c24" />
      <stop offset="100%" stop-color="#181335" />
    </linearGradient>
    <radialGradient id="glow-purple" cx="85%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#231b46" stroke-width="0.8" stroke-opacity="0.6" />
      <circle cx="0" cy="0" r="1" fill="#4c3a85" opacity="0.5" />
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <rect width="100%" height="100%" fill="url(#glow-purple)" />
  <rect width="100%" height="100%" fill="url(#glow-cyan)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Coordinates & Blueprint Details -->
  <!-- Top/Bottom boundary lines -->
  <line x1="0" y1="1" x2="800" y2="1" stroke="#2e2252" stroke-width="1.2" />
  <line x1="0" y1="239" x2="800" y2="239" stroke="#2e2252" stroke-width="1.2" />
  
  <!-- Coordinate ticks and labels -->
  <path d="M 100,0 L 100,6 M 200,0 L 200,6 M 300,0 L 300,6 M 400,0 L 400,6 M 500,0 L 500,6 M 600,0 L 600,6 M 700,0 L 700,6" class="coordinate-tick" />
  <path d="M 100,240 L 100,234 M 200,240 L 200,234 M 300,240 L 300,234 M 400,240 L 400,234 M 500,240 L 500,234 M 600,240 L 600,234 M 700,240 L 700,234" class="coordinate-tick" />
  <text x="100" y="14" class="font-mono coordinate-text" text-anchor="middle">100_PX</text>
  <text x="300" y="14" class="font-mono coordinate-text" text-anchor="middle">300_PX</text>
  <text x="500" y="14" class="font-mono coordinate-text" text-anchor="middle">500_PX</text>
  <text x="700" y="14" class="font-mono coordinate-text" text-anchor="middle">700_PX</text>

  <!-- Left Side: Professional Profile Text -->
  <!-- Hello pill tag -->
  <g transform="translate(50, 42)">
    <rect x="0" y="0" width="112" height="20" rx="10" class="tag-border" />
    <circle cx="10" cy="10" r="3.5" fill="#06b6d4" class="pulse-dot" />
    <text x="22" y="13.5" class="font-mono tag">NODE_ONLINE</text>
  </g>
  
  <!-- Name Title -->
  <text x="50" y="98" class="font-sans title">JOHN MARK CAYABYAB</text>
  
  <!-- Subtitle -->
  <text x="50" y="132" class="font-sans subtitle">Systems Engineer &amp; Full-Stack Developer</text>
  
  <!-- Description -->
  <text x="50" y="166" class="font-sans desc">Designing modular, high-reliability software from database models</text>
  <text x="50" y="186" class="font-sans desc">to clean user interfaces. Specializing in workflow automation.</text>

  <!-- Right Side: Bento System Architecture Visualization -->
  <g transform="translate(490, 24)">
    <!-- Glassmorphic Container Panel -->
    <rect x="0" y="0" width="260" height="192" rx="12" class="panel-bg" />
    
    <!-- Panel Header -->
    <rect x="0" y="0" width="260" height="26" rx="12" fill="#1b1635" opacity="0.9" />
    <circle cx="12" cy="13" r="3" fill="#ef4444" />
    <circle cx="22" cy="13" r="3" fill="#f59e0b" />
    <circle cx="32" cy="13" r="3" fill="#10b981" />
    <text x="248" y="17" class="font-mono" font-size="9" fill="#64748b" text-anchor="end">SYS_SCHEMA_v1.0</text>
    <line x1="0" y1="26" x2="260" y2="26" stroke="#2e2252" stroke-width="1.2" />

    <!-- 1. Client / UI Node -->
    <g transform="translate(18, 56)">
      <rect x="0" y="0" width="64" height="42" rx="4" class="node node-active-cyan" />
      <line x1="0" y1="10" x2="64" y2="10" stroke="#06b6d4" stroke-width="0.8" />
      <circle cx="5" cy="5" r="1.5" fill="#06b6d4" />
      <circle cx="10" cy="5" r="1.5" fill="#06b6d4" />
      <rect x="6" y="16" width="30" height="3" rx="1.5" fill="#06b6d4" opacity="0.6" />
      <rect x="6" y="24" width="40" height="3" rx="1.5" fill="#2e2252" />
      <rect x="6" y="32" width="20" height="3" rx="1.5" fill="#2e2252" />
      <text x="32" y="52" class="font-mono" font-size="8" fill="#94a3b8" text-anchor="middle">CLIENT_UI</text>
    </g>

    <!-- 2. Gateway / QMS Router -->
    <g transform="translate(144, 42)">
      <rect x="0" y="0" width="92" height="52" rx="4" class="node node-active-gold" />
      <rect x="6" y="8" width="80" height="8" rx="1.5" fill="#0f0c24" stroke="#2e2252" stroke-width="0.8" />
      <circle cx="80" cy="12" r="1.8" fill="#facc15" />
      <line x1="12" y1="12" x2="60" y2="12" stroke="#facc15" stroke-dasharray="2 2" stroke-width="1" />

      <rect x="6" y="22" width="80" height="8" rx="1.5" fill="#0f0c24" stroke="#2e2252" stroke-width="0.8" />
      <circle cx="80" cy="26" r="1.8" fill="#10b981" class="pulse-dot" />
      <line x1="12" y1="26" x2="65" y2="26" stroke="#10b981" stroke-width="1" />

      <rect x="6" y="36" width="80" height="8" rx="1.5" fill="#0f0c24" stroke="#2e2252" stroke-width="0.8" />
      <circle cx="80" cy="40" r="1.8" fill="#06b6d4" />
      <line x1="12" y1="40" x2="50" y2="40" stroke="#06b6d4" stroke-dasharray="1 1" stroke-width="1" />
      
      <text x="46" y="62" class="font-mono" font-size="8" fill="#94a3b8" text-anchor="middle">QMS_SERVER</text>
    </g>

    <!-- 3. DB Storage Node -->
    <g transform="translate(74, 126)">
      <ellipse cx="24" cy="6" rx="16" ry="4" fill="#1a153b" stroke="#a78bfa" stroke-width="1.2" />
      <path d="M 8,6 L 8,16 A 16,4 0 0 0 40,16 L 40,6" fill="#1a153b" stroke="#a78bfa" stroke-width="1.2" />
      <path d="M 8,16 A 16,4 0 0 0 40,16" fill="none" stroke="#a78bfa" stroke-dasharray="2 2" stroke-width="0.8" />
      <path d="M 8,16 L 8,26 A 16,4 0 0 0 40,26 L 40,16" fill="#1a153b" stroke="#a78bfa" stroke-width="1.2" />
      <text x="24" y="38" class="font-mono" font-size="8" fill="#94a3b8" text-anchor="middle">DB_STORE</text>
    </g>

    <!-- 4. Telemetry Metrics -->
    <g transform="translate(178, 126)">
      <rect x="0" y="0" width="58" height="28" rx="4" class="node node-active-cyan" />
      <path d="M 6,22 L 18,12 L 28,18 L 40,8 L 52,14" fill="none" stroke="#06b6d4" stroke-width="1.2" />
      <circle cx="52" cy="14" r="2" fill="#facc15" />
      <text x="29" y="38" class="font-mono" font-size="8" fill="#94a3b8" text-anchor="middle">METRICS</text>
    </g>

    <!-- Connective Flow Lines -->
    <path d="M 82,77 Q 113,77 144,68" fill="none" class="link-flow link-flow-cyan" />
    <path d="M 190,94 Q 144,115 110,136" fill="none" class="link-flow link-flow-purple" />
    <path d="M 207,94 L 207,126" fill="none" class="link-flow link-flow-gold" />
    <path d="M 74,142 Q 36,128 44,98" fill="none" stroke="#2e2252" stroke-dasharray="3 3" stroke-width="1.2" />
  </g>
</svg>
